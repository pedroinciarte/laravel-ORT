name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: mbstring, bcmath, pdo_mysql
        coverage: xdebug

    # Instalación de dependencias
    - name: Install PHP dependencies
      run: composer install --prefer-dist --no-progress

    # Smoke Test inicial (Laravel se ejecuta correctamente)
    - name: Smoke Test - Prepare Laravel
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan config:cache

    # Linting y formato
    - name: Run PHP Linter (Pint)
      run: vendor/bin/pint --test

    - name: Run PHP Static Analysis (PHPStan)
      run: vendor/bin/phpstan analyse

    # Tests automatizados con cobertura
    - name: Run Tests with Coverage
      run: php artisan test --coverage

    # Reporte de cobertura
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage
        path: storage/framework/testing/discover
